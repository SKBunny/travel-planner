
{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow-sm rounded-4">

        <!-- HEADER -->
        <div class="card-header bg-white border-0 d-flex align-items-center">
            <h5 class="mb-0">🤖 AI Асистент</h5>
        </div>

        <!-- CHAT -->
        <div id="messages" style="height: 400px; overflow-y: auto; padding: 20px; background: #f8f9fa;">
            <div class="bg-white p-2 rounded mb-2">
                Привіт! 👋 Я допоможу спланувати подорож ✈️
            </div>
        </div>

        <!-- INPUT -->
        <div class="card-footer bg-white d-flex gap-2">
            <input id="input" class="form-control" placeholder="Запитай про подорож...">
            <button class="btn btn-success" onclick="send()">Надіслати</button>
        </div>

    </div>
</div>
   <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
const messages = document.getElementById("messages");
const input = document.getElementById("input");

function addMessage(text, type) {
    const messageElement = document.createElement("div");

    messageElement.classList.add("message", type);
    messageElement.style.marginBottom = "10px";
    messageElement.style.padding = "10px";
    messageElement.style.borderRadius = "8px";
    messageElement.style.backgroundColor = type === "user" ? "#e1f5fe" : "#f1f1f1";

    if (type === "bot" && typeof marked !== "undefined") {
        messageElement.innerHTML = marked.parse(text);
    } else {
        messageElement.innerText = text;
    }

    messages.appendChild(messageElement);
    messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
    removeTyping();

    const typingElement = document.createElement("div");
    typingElement.id = "typing-message";
    typingElement.style.marginBottom = "10px";
    typingElement.style.padding = "10px";
    typingElement.style.borderRadius = "8px";
    typingElement.style.backgroundColor = "#f1f1f1";
    typingElement.style.color = "#6c757d";
    typingElement.innerText = "🤖 Бот друкує...";

    messages.appendChild(typingElement);
    messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
    const typingElement = document.getElementById("typing-message");
    if (typingElement) {
        typingElement.remove();
    }
}

async function send() {
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    showTyping();

    try {
        const res = await fetch("/api/ai", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: text})
        });

        const data = await res.json();

        removeTyping();

        if (data.reply) {
            addMessage(data.reply, "bot");
        } else {
            addMessage("⚠️ Немає відповіді від сервера", "bot");
        }

    } catch (err) {
        removeTyping();
        addMessage("⚠️ Помилка: " + err.message, "bot");
    }
}

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        send();
    }
});
</script>

{% endblock %}
