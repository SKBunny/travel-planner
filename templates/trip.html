{% extends "base.html" %}

{% block title %}Нова подорож - Travel Planner{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title mb-4">Створити нову подорож</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label">Назва подорожі</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="destination" class="form-label">Напрямок</label>
                        <input type="text" class="form-control" id="destination" name="destination" placeholder="Наприклад: Париж, Франція" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="start_date" class="form-label">Дата початку</label>
                            <input type="date" class="form-control" id="start_date" name="start_date" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="end_date" class="form-label">Дата закінчення</label>
                            <input type="date" class="form-control" id="end_date" name="end_date" required>
                        </div>
                    </div>
                    <div class="row mb-3">
    <div class="col-md-8">
        <label for="budget" class="form-label">Бюджет</label>
        <input type="number" class="form-control" id="budget" name="budget" step="0.01" required>
    </div>
    <div class="col-md-4">
        <label for="currency" class="form-label">Валюта</label>
        <select class="form-select" id="currency" name="currency" required>
            {% for curr in currencies %}
                <option value="{{ curr }}" {% if curr == 'UAH' %}selected{% endif %}>
                    {{ curr }} ({{ currency_symbols[curr] }})
                </option>
            {% endfor %}
        </select>
    </div>
</div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Створити подорож</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Скасувати</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
